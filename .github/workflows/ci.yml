name: abark-llm-finetuning-recipes CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev deps (CPU only)
        run: |
          pip install --upgrade pip
          pip install pytest pyyaml
      - name: Run tests
        run: pytest tests/ -v --tb=short
      - name: Lint
        run: |
          pip install ruff
          ruff check recipes/ deploy/
